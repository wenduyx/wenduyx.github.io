<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shkebede bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @font-face {
            font-family: 'Google Sans';
            font-style: normal;
            font-weight: 400;
            src: local('Google Sans Regular'), local(GoogleSans-Regular), url(https://fonts.gstatic.com/s/googlesans/v5/4UaGrENHsxJlGDuGo1OIlL3Owp4.woff2) format("woff2");
        }
        
        @font-face {
            font-family: 'Google Sans';
            font-style: normal;
            font-weight: 500;
            src: local('Google Sans Medium'), local('GoogleSans-Medium'), url(https://fonts.gstatic.com/s/googlesans/v11/4UabrENHsxJlGDuGo1OIlLU94YtzCwY.woff2) format('woff2');
        }

        :root {
            --md-sys-color-background: #141218;
            --md-sys-color-surface: #211f26;
            --md-sys-color-on-surface: #e6e1e5;
            --md-sys-color-on-surface-variant: #cac4d0;
            --md-sys-color-primary-container: #4f378b;
            --md-sys-color-on-primary-container: #eaddff;
            --md-sys-color-error: #f2b8b5;
            
            --radius-main: 28px;
            --radius-small: 8px; 
        }

        body.light-mode {
            --md-sys-color-background: #fef7ff;
            --md-sys-color-surface: #f3edf7;
            --md-sys-color-on-surface: #1d1b20;
            --md-sys-color-on-surface-variant: #49454f;
            --md-sys-color-primary-container: #eaddff;
            --md-sys-color-on-primary-container: #21005d;
            --md-sys-color-error: #b3261e;
        }

        body {
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            font-family: 'Google Sans', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* --- Верхняя карточка --- */
        .top-card {
            background-color: var(--md-sys-color-surface);
            padding: 28px;
            border-radius: var(--radius-main) var(--radius-main) var(--radius-small) var(--radius-small);
        }

        .main-text { font-size: 32px; font-weight: 500; margin-bottom: 2px; }
        .hashtag { color: #d0bcff; }
        body.light-mode .hashtag { color: #6750a4; }

        .secondary-text {
            color: var(--md-sys-color-on-surface-variant);
            font-size: 16px;
            margin-bottom: 24px;
        }

        .image-time-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .profile-image {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            object-fit: cover;
        }

        .time-wrapper { text-align: right; }
        .time-label { font-size: 11px; color: var(--md-sys-color-on-surface-variant); text-transform: uppercase; margin-bottom: 4px; }
        .local-time { font-size: 36px; font-weight: 400; line-height: 1; }
        .warning-text { color: var(--md-sys-color-error); font-size: 12px; font-weight: 500; text-transform: uppercase; margin-top: 8px; display: none; }

        /* --- Кнопка "Случайный факт" --- */
        .action-button {
            width: 100%;
            padding: 20px;
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            border: none;
            border-radius: var(--radius-small) var(--radius-small) var(--radius-main) var(--radius-main);
            font-size: 18px;
            font-family: 'Google Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s;
        }

        /* --- Нижний ряд --- */
        .bottom-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .social-btn.tg {
            flex: 1;
            height: 64px;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 24px;
            border-radius: var(--radius-main) var(--radius-small) var(--radius-small) var(--radius-main);
        }

        .social-btn.tt {
            flex: 1;
            height: 64px;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 24px;
            border-radius: var(--radius-small) var(--radius-main) var(--radius-main) var(--radius-small);
        }

        .theme-btn {
            width: 64px;
            height: 64px;
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            border: none;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
        }

        .fact-container {
            display: none;
            background-color: var(--md-sys-color-surface);
            padding: 20px;
            border-radius: 24px;
            animation: slideUp 0.3s ease-out;
        }

        .comments-section {
            background-color: var(--md-sys-color-surface);
            padding: 12px;
            border-radius: 24px;
            min-height: 80px;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-card">
            <div class="main-text">Шкебеде <span class="hashtag">#victim</span></div>
            <div class="secondary-text">Material Designer</div>
            <div class="image-time-row">
                <img src="avatarka.jpg" alt="Profile" class="profile-image">
                <div class="time-wrapper">
                    <div class="time-label">местное время</div>
                    <div class="local-time" id="timeDisplay">00.00.00</div>
                    <div class="warning-text" id="warningText">не писать!</div>
                </div>
            </div>
        </div>

        <button class="action-button" id="getFactBtn">Случайный факт</button>

        <div class="bottom-row">
            <a href="https://t.me/Bozhechtozaidiot" target="_blank" class="social-btn tg"><i class="fa-brands fa-telegram"></i></a>
            <a href="https://www.tiktok.com/@privet_gt" target="_blank" class="social-btn tt"><i class="fa-brands fa-tiktok"></i></a>
            <button class="theme-btn" id="themeToggle"><i class="fas fa-palette"></i></button>
        </div>

        <div class="fact-container" id="factOutput"></div>
        <div id="comments-container" class="comments-section"></div>
    </div>

    <script>
        function updateTime() {
            const display = document.getElementById('timeDisplay');
            const warning = document.getElementById('warningText');
            const now = new Date();
            const moscowTime = new Intl.DateTimeFormat('ru-RU', {
                timeZone: 'Europe/Moscow',
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false
            }).formatToParts(now);
            const h = moscowTime.find(p => p.type === 'hour').value;
            const m = moscowTime.find(p => p.type === 'minute').value;
            const s = moscowTime.find(p => p.type === 'second').value;
            display.textContent = `${h}.${m}.${s}`;
            const hourInt = parseInt(h);
            warning.style.display = (hourInt >= 0 && hourInt < 9) ? 'block' : 'none';
        }
        updateTime();
        setInterval(updateTime, 1000);

        const commentsContainer = document.getElementById('comments-container');
        const themeToggle = document.getElementById('themeToggle');
        let isDark = true;

        function loadComments(dark) {
            commentsContainer.innerHTML = '';
            const script = document.createElement('script');
            script.async = true;
            script.src = "https://comments.app/js/widget.js?3";
            script.setAttribute('data-comments-app-website', '5JvOrkuW');
            script.setAttribute('data-limit', '5');
            script.setAttribute('data-colorful', '1');
            if (dark) script.setAttribute('data-dark', '1');
            commentsContainer.appendChild(script);
        }

        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            document.body.classList.toggle('light-mode');
            loadComments(isDark);
        });
        loadComments(true);

        const factsList = [
            "Факт №1: \"Моча отбеливает зубы\" Сосницкий Д.И.",
            "Факт №8: \"Пузо беременных мужчин больше чем у дохлой бабки\" Вирусняк",
            "Факт №2: Сонуки мой брадар, просто знайте это", 
            "Факт №9: Несмотря на расстояние в ≈3500км каймер смог подорвать жопу санечку",
            "Факт №3: Карасю пасиба, без него я бы не смог разобраться с этой хуйней",
            "Факт №14: Надеюсь когда я умру от старости, все мои друзья устроят оргию на моей могиле",
            "Факт №12: \"а 😢ещё🎉 я🥰 пидофил😎\" @Time1194",
            "Факт №13: Принесу пива, возьму в рот @TheSane4ek",
            "Факт №10: Ты долгое время был неактивен на сервере сочные 🏳️‍⚧️фембои 24/7!",
            "Факт №6: Скоро на этом сайте будут комментарии", 
            "Факт №7: Этот факт я написал после того как облился чаем"
        ];

        const btn = document.getElementById('getFactBtn');
        const output = document.getElementById('factOutput');
        let lastIndices = [];

        btn.addEventListener('click', () => {
            output.style.display = 'none';
            setTimeout(() => {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * factsList.length);
                } while (lastIndices.includes(randomIndex));
                lastIndices.push(randomIndex);
                if (lastIndices.length > 2) lastIndices.shift();
                output.textContent = factsList[randomIndex];
                output.style.display = 'block';
            }, 300);
        });
    </script>
</body>
</html>
